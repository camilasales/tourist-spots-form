<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css">
    <title>Cadastro Pontos Turísticos</title>
</head>
<body>
    <header>
        <h1>Cadastro de Pontos Turísticos</h1>
    </header>
    
    <form name="tourist-points" id="tourist-points" action="" method="POST">
        <fieldset class="fields__block">
            <legend>Informações</legend>
            <div>
                <label for="name">Nome do ponto turístico: <span>*</span> </label>
                <input type="text" id="name" autofocus placeholder="Digite o nome..." required>
                <label for="description">Breve descrição: <span>*</span> </label>
                <textarea name="description" id="description" placeholder="Exemplo: um ponto turístico bem movimentado..." ></textarea>
            </div>
        </fieldset>
        <div class="type__entry">
            <label>Tipo de entrada: <span>*</span></label>
            <input type="radio" id="free" name="type_entry" value="free" checked="checked">
            <label for="type-entry-label-free">Gratuita </label>
            <input type="radio" id="pay" name="type_entry" value="pay">
            <label for="type-entry-label-pay">Paga</label>
        </div>
        <fieldset class="fields__block">
            <legend>Localização</legend>
            <div>
                <label for="cep">Cep:</label>
                <input type="text" id="cep" placeholder="00000-000">
                <label for="district">Bairro: </label>
                <input type="text" id="district" placeholder="Digite o bairro...">
            </div>
            <div>
                <label for="adress">Rua, Avenida, Alameda:<span>*</span> </label>
                <input type="text" id="adress" placeholder="Digite o endereço..." required>
                <label for="state">Estado:<span>*</span>  </label>
                <select id="state" required>
                    <option value="0">Selecione uma opção</option>
                    <option value="AC">
                        Acre
                    </option>
                    <option value="AL">
                        Alagoas
                    </option>
                    <option value="AP">
                        Amapá
                    </option>
                    <option value="AM">
                        Amazonas
                    </option>
                    <option value="BA">
                        Bahia
                    </option>
                    <option value="CE">
                        Ceará
                    </option>
                    <option value="ES">
                        Espírito Santo
                    </option>
                    <option value="GO">
                        Goiás
                    </option>
                    <option value="MA">
                        Maranhão
                    </option>
                    <option value="MT">
                        Mato Grosso
                    </option>
                    <option value="MS">
                        Mato Grosso do Sul
                    </option>
                    <option value="MG">
                        Minas Gerais
                    </option>
                    <option value="PA">
                        Pará
                    </option>
                    <option value="PB">
                        Paraíba
                    </option>
                    <option value="PR">
                        Paraná
                    </option>
                    <option value="PE">
                        Pernambuco
                    </option>
                    <option value="PI">
                        Piauí
                    </option>
                    <option value="RJ">
                        Rio de Janeiro
                    </option>
                    <option value="RN">
                        Rio Grande do Norte
                    </option>
                    <option value="RS">
                        Rio Grande do Sul
                    </option>
                    <option value="RO">
                        Rondônia
                    </option>
                    <option value="RR">
                        Roraima
                    </option>
                    <option value="SC">
                        Santa Catarina
                    </option>
                    <option value="SP">
                        São Paulo
                    </option>
                    <option value="SE">
                        Sergipe
                    </option>
                    <option value="TO">
                        Tocantins
                    </option>
                    <option value="DF">
                        Distrito Federal
                    </option>
                </select>
            </div>
            <div>
                <label for="number">Número: </label>
                <input type="text" id="number" placeholder="Digite o número...">
                <label for="city">Cidade:<span>*</span>  </label>
                <input type="text" id="city" placeholder="Digite o a cidade..." required>
            </div>
        </fieldset>
        <fieldset class="operation">
            <legend>Dia e horário de funcionamento</legend>
            
            <div>
                <input type="checkbox" id="sanday">
                <label for="sanday" class="operation__label__day">Domingo</label>

                <label for="sanday-start-time"">Horário de inicio:</label>
                <input type="time" id="sanday-start-time" class="operation__time"> 

                <label for="sanday-end-time">Horário de fim:</label>
                <input type="time" id="sanday-end-time" class="operation__time">
            </div>
            <div>
                <input type="checkbox" id="mondey">
                <label for="mondey" class="operation__label__day">Segunda</label>

                <label for="mondey-start-time">Horário de inicio:</label>
                <input type="time" id="mondey-start-time" class="operation__time">

                <label for="mondey-end-time">Horário de fim:</label>
                <input type="time" id="mondey-end-time" class="operation__time">
            </div>
            <div>
                <input type="checkbox" id="tuesday">
                <label for="tuesday" class="operation__label__day">Terça</label>

                <label for="tuesday-start-time">Horário de inicio:</label>
                <input type="time" id="tuesday-start-time" class="operation__time">

                <label for="tuesday-end-time">Horário de fim:</label>
                <input type="time" id="tuesday-end-time" class="operation__time">
            </div>
            <div>
                <input type="checkbox" id="wednesday">
                <label for="wednesday" class="operation__label__day">Quarta</label>

                <label for="wednesday-start-time">Horário de inicio:</label>
                <input type="time" id="wednesday-start-time" class="operation__time">

                <label for="wednesday-end-time">Horário de fim:</label>
                <input type="time" id="wednesday-end-time" class="operation__time">
            </div>
            <div>
                <input type="checkbox" id="thursday">
                <label for="thursday" class="operation__label__day">Quinta</label>
                
                <label for="thursday-start-time">Horário de inicio:</label>
                <input type="time" id="thursday-start-time" class="operation__time">

                <label for="thursday-end-time">Horário de fim:</label>
                <input type="time" id="thursday-end-time" class="operation__time">
            </div>
            <div>
                <input type="checkbox" id="friday">
                <label for="friday" class="operation__label__day">Sexta</label>

                <label for="friday-start-time">Horário de inicio:</label>
                <input type="time" id="friday-start-time" class="operation__time">

                <label for="friday-end-time">Horário de fim:</label>
                <input type="time" id="friday-end-time" class="operation__time">
            </div>
            <div>
                <input type="checkbox" id="saturday">
                <label for="saturday" class="operation__label__day">Sábado</label>
                
                <label for="saturday-start-time">Horário de inicio:</label>
                <input type="time" id="saturday-start-time" class="operation__time">

                <label for="saturday-end-time">Horário de fim:</label>
                <input type="time" id="saturday-end-time" class="operation__time">
            </div>
            
        </fieldset>
        <fieldset class="fields__block">
            <legend>Contatos</legend>
            <div>
                <label for="phone">Telefone</label>
                <input type="tel" id="phone" placeholder="(00)0000-0000">
                <label for="facebook">Link do Facebook</label>
                <input type="url" id="facebook" placeholder="https://www.facebook.com/">
            </div>
            <div>
                <label for="instagram">Link do Instagram</label>
                <input type="url" id="instagram" placeholder="https://www.instagram.com/">
                <label for="site">Link do Site</label>
                <input type="url" id="site" placeholder="https://www.site.com">
            </div>
        </fieldset>
        <button type="submit">Enviar dados</button>
    </form>
</body>
</html>
